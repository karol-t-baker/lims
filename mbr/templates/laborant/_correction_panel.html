{# Correction auto-calc panels: perhydrol (sulfonowanie→utlenianie) + standaryzacja (utlenianie→standaryzacja) #}
<script>
/* ═══ CORRECTION AUTO-CALC PANELS ═══ */

function renderCorrectionPanel(panelType, sekcja, ctx) {
    var container = document.getElementById('correction-panel-' + sekcja);
    if (!container) return;

    if (panelType === 'perhydrol') {
        _renderPerhydrolPanel(container, sekcja, ctx);
    } else if (panelType === 'standaryzacja_v2') {
        _renderStandaryzacjaV2Panel(container, sekcja, ctx);
    } else if (panelType === 'standaryzacja') {
        _renderStandaryzacjaPanel(container, sekcja, ctx);
    }
}

async function _renderPerhydrolPanel(container, sekcja, ctx) {
    var wynikSo3 = ctx.wynik_so3 != null ? String(ctx.wynik_so3).replace('.', ',') : '';
    var masa = ctx.masa_szarzy != null ? String(ctx.masa_szarzy).replace('.', ',') : '';
    var nastaw = ctx.masa_szarzy || 0;
    var Meff = nastaw > 6600 ? nastaw - 1000 : nastaw - 500;
    var MeffStr = Meff > 0 ? String(Meff).replace('.', ',') : '';

    // Fetch global correction targets for this product + stage
    var etapId = ctx.etap_id || 0;
    var produkt = ctx.produkt || '';
    var targets = {};
    if (etapId && produkt) {
        try {
            var resp = await fetch('/api/pipeline/lab/correction-targets/' + etapId + '/' + encodeURIComponent(produkt));
            if (resp.ok) targets = await resp.json();
        } catch(e) {}
    }
    var targetSo3 = targets.target_so3 != null ? String(targets.target_so3).replace('.', ',') : '0';
    var targetNadtlenki = targets.target_nadtlenki != null ? String(targets.target_nadtlenki).replace('.', ',') : '0';

    var recomp = 'recomputePerhydrol(\'' + sekcja + '\')';
    var saveTarget = 'saveCorrectionTarget(\'' + sekcja + '\',' + etapId + ',\'' + produkt + '\')';

    // Determine action button from gate pass context
    var isNewRoundUtl = (window._gatePassAction === 'new_round_utl');
    var actionBtn = '';
    if (window._gatePassAction === 'pompuj') {
        actionBtn =
            '<button class="gate-btn gate-btn-ok" onclick="completePompuj()">Przepompuj na zbiornik</button>' +
            '<button class="gate-btn gate-btn-sec" onclick="openSmallCorrectionDialog()">Ma\u0142a korekta + przepompuj</button>';
    } else if (isNewRoundUtl) {
        actionBtn =
            '<button class="gate-btn gate-btn-warn" onclick="advanceWithPerhydrol(\'' + sekcja + '\')">Nowa runda utlenienia \u2192</button>' +
            '<button class="gate-btn gate-btn-sec" onclick="showPerhydrolWithStand(\'' + sekcja + '\')">Razem ze standaryzacj\u0105 \u2192</button>';
    } else {
        actionBtn =
            '<button class="gate-btn gate-btn-ok" onclick="advanceWithPerhydrol(\'' + sekcja + '\')">Zatwierd\u017A etap &rarr;</button>';
    }

    var h2o2Badge = isNewRoundUtl
        ? '<span class="gate-badge gate-badge-fail">KOREKTA</span>'
        : '<span class="gate-badge gate-badge-ok">PASS</span>';
    var h2o2Cls = isNewRoundUtl ? 'gate-fail' : 'gate-h2o2';

    container.innerHTML =
        '<div class="gate-section ' + h2o2Cls + '" style="margin-top:8px;">' +
            '<div class="gate-head">' +
                '<div class="gate-icon gate-icon-blue" style="font-size:9px;">H\u2082O\u2082</div>' +
                '<span class="gate-title">Dodatek procesowy &mdash; perhydrol</span>' +
                h2o2Badge +
            '</div>' +
            '<div class="gate-body">' +
                '<div class="corr-fields corr-fields-3">' +
                    _corrField('SO\u2083\u00B2\u207B wynik [%]', 'corr-so3-wynik-' + sekcja, wynikSo3, true, recomp) +
                    _corrField('Masa szar\u017Cy [kg]', 'corr-masa-' + sekcja, masa, true, recomp) +
                    _corrField('Masa efektywna [kg]', 'corr-meff-' + sekcja, MeffStr, false, recomp) +
                '</div>' +
                '<div class="corr-fields corr-fields-2" style="margin-top:10px;">' +
                    _corrField('Docelowe SO\u2083\u00B2\u207B [%]', 'corr-target-so3-' + sekcja, targetSo3, false,
                        recomp + ';' + saveTarget,
                        '<div class="corr-global-tag">Edycja = zapis globalny</div>') +
                    _corrField('Docelowe nadtlenki [%]', 'corr-target-nadt-' + sekcja, targetNadtlenki, false,
                        recomp + ';' + saveTarget,
                        '<div class="corr-global-tag">Edycja = zapis globalny</div>') +
                '</div>' +
                '<div id="corr-result-' + sekcja + '" class="corr-result" style="display:flex;align-items:center;gap:16px;text-align:left;">' +
                    '<div style="flex:1;">' +
                        '<div class="corr-result-label">Dawka sugerowana</div>' +
                        '<div class="corr-result-val" id="corr-calc-val-' + sekcja + '">&mdash; kg</div>' +
                    '</div>' +
                    '<div style="flex:1;">' +
                        '<span class="corr-field-label">Dawka perhydrolu [kg]</span>' +
                        '<input id="corr-manual-kg-' + sekcja + '" class="corr-field-input" type="text" inputmode="decimal"' +
                            ' placeholder="wpisz lub zostaw podpowied\u017A" style="font-weight:700;font-size:14px;"' +
                            ' data-ebr-id="' + ebrId + '"' +
                            ' data-etap-id="' + etapId + '"' +
                            ' data-substancja="Perhydrol 34%"' +
                            ' data-suggested=""' +
                            ' oninput="onManualPerhydrolInput(\'' + sekcja + '\')"' +
                            ' onblur="saveKorektaField(this)">' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="gate-actions">' + actionBtn + '</div>' +
        '</div>';

    recomputePerhydrol(sekcja);

    // Restore saved manual perhydrol correction (persist across F5 / batch switch)
    var sesjaId = (window._lastGate && window._lastGate.sesja_id) || null;
    if (sesjaId) {
        var saved = await _loadSavedKorekty(window.ebrId, etapId, sesjaId);
        var manualEl = document.getElementById('corr-manual-kg-' + sekcja);
        if (manualEl && saved['Perhydrol 34%'] != null) {
            manualEl.value = String(saved['Perhydrol 34%']).replace('.', ',');
        }
    }
}

async function _renderStandaryzacjaV2Panel(container, sekcja, ctx) {
    var wynikNd20 = ctx.wynik_nd20 != null ? String(ctx.wynik_nd20).replace('.', ',') : '';
    var wynikPh = ctx.wynik_ph != null ? String(ctx.wynik_ph).replace('.', ',') : '';
    var masa = ctx.masa_szarzy != null ? String(ctx.masa_szarzy).replace('.', ',') : '';
    var nastaw = ctx.masa_szarzy || 0;
    var Meff = nastaw > 6600 ? nastaw - 1000 : nastaw - 500;
    var MeffStr = Meff > 0 ? String(Meff).replace('.', ',') : '';

    var etapId = ctx.etap_id || 0;
    var produkt = ctx.produkt || '';
    var targets = {};
    if (etapId && produkt) {
        try {
            var resp = await fetch('/api/pipeline/lab/correction-targets/' + etapId + '/' + encodeURIComponent(produkt));
            if (resp.ok) targets = await resp.json();
        } catch(e) {}
    }
    var targetNd20 = targets.target_nd20 != null ? String(targets.target_nd20).replace('.', ',') : '';
    var targetPh = targets.target_ph != null ? String(targets.target_ph).replace('.', ',') : '';

    var recomp = 'recomputeStandV2(\'' + sekcja + '\')';
    var saveT = 'saveStandV2Targets(\'' + sekcja + '\',' + etapId + ',\'' + produkt + '\')';

    // Action button
    var isNewRoundStand = (window._gatePassAction === 'new_round_stand');
    var isPerhydrolWithStand = (window._gatePassAction === 'perhydrol_with_stand');
    var actionBtn = '';
    if (window._gatePassAction === 'pompuj') {
        actionBtn =
            '<button class="gate-btn gate-btn-ok" onclick="completePompuj()">Przepompuj na zbiornik</button>';
    } else if (isNewRoundStand) {
        actionBtn =
            '<button class="gate-btn gate-btn-warn" onclick="advanceStandNewRound(\'' + sekcja + '\')">Zale\u0107 korekt\u0119 + nowa runda \u2192</button>' +
            '<button class="gate-btn gate-btn-sec" style="margin-left:8px;" onclick="approveStandWithUwagi(\'' + sekcja + '\')">Zatwierd\u017A z uwagami</button>';
    } else if (isPerhydrolWithStand) {
        actionBtn =
            '<button class="gate-btn gate-btn-ok" onclick="advancePerhydrolWithStand(\'' + sekcja + '\')">Dodaj korekty + przejd\u017A do standaryzacji \u2192</button>';
    } else {
        actionBtn =
            '<button class="gate-btn gate-btn-ok" onclick="advanceWithStandV2(\'' + sekcja + '\')">Zatwierd\u017A etap &rarr;</button>';
    }

    var standBadge = (isNewRoundStand || isPerhydrolWithStand)
        ? '<span class="gate-badge gate-badge-fail">KOREKTA</span>'
        : '<span class="gate-badge gate-badge-ok">PASS</span>';
    var standCls = (isNewRoundStand || isPerhydrolWithStand) ? 'gate-fail' : 'gate-h2o2';

    container.innerHTML =
        '<div class="gate-section ' + standCls + '" style="margin-top:8px;">' +
            '<div class="gate-head">' +
                '<div class="gate-icon ' + (isNewRoundStand ? 'gate-icon-warn' : 'gate-icon-blue') + '" style="font-size:10px;">' + (isNewRoundStand ? '!' : '\u2192') + '</div>' +
                '<span class="gate-title">Korekta standaryzuj\u0105ca &mdash; woda + kwas</span>' +
                standBadge +
            '</div>' +
            '<div class="gate-body">' +
                '<div class="corr-fields corr-fields-3">' +
                    _corrField('nD20 wynik', 'corr-nd20-wynik-' + sekcja, wynikNd20, true, recomp) +
                    _corrField('pH wynik', 'corr-ph-wynik-' + sekcja, wynikPh, true, recomp) +
                    _corrField('Masa efektywna [kg]', 'corr-meff-st-' + sekcja, MeffStr, false, recomp) +
                '</div>' +
                '<div class="corr-fields corr-fields-2" style="margin-top:10px;">' +
                    _corrField('Docelowe nD20', 'corr-target-nd20-' + sekcja, targetNd20, false,
                        recomp + ';' + saveT,
                        '<div class="corr-global-tag">Edycja = zapis globalny</div>') +
                    _corrField('Docelowe pH', 'corr-target-ph-' + sekcja, targetPh, false,
                        recomp + ';' + saveT,
                        '<div class="corr-global-tag">Edycja = zapis globalny</div>') +
                '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;">' +
                    '<div class="corr-result">' +
                        '<div class="corr-result-label">Woda &mdash; dawka sugerowana</div>' +
                        '<div class="corr-result-val" id="corr-woda-calc-' + sekcja + '">&mdash; kg</div>' +
                    '</div>' +
                    '<div class="corr-result">' +
                        '<div class="corr-result-label">Kwas cytrynowy &mdash; dawka sugerowana (model)</div>' +
                        '<div class="corr-result-val" id="corr-kwas-calc-' + sekcja + '">&mdash; kg</div>' +
                    '</div>' +
                '</div>' +
                '<div class="corr-fields" style="margin-top:10px;grid-template-columns:1fr 1fr 1fr;">' +
                    _corrFieldKorekta('Woda [kg]', 'corr-manual-woda-' + sekcja, '', ebrId, etapId, 'Woda łącznie', sekcja) +
                    _corrFieldKorekta('Kwas cytrynowy [kg]', 'corr-manual-kwas-' + sekcja, '', ebrId, etapId, 'Kwas cytrynowy', sekcja) +
                    '<div>' +
                        '<span class="corr-field-label">WODA \u0141\u0104CZNIE [KG]</span>' +
                        '<input id="corr-total-woda-' + sekcja + '" class="corr-field-input corr-total-derived" type="text" readonly tabindex="-1"' +
                            ' style="font-weight:700;font-size:14px;border-color:var(--teal);background:var(--teal-bg);color:var(--teal);text-align:center;"' +
                            ' title="Suma Woda + Kwas cytrynowy (tylko odczyt)">' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="gate-actions">' + actionBtn + '</div>' +
        '</div>';

    recomputeStandV2(sekcja);
    recomputeStandTotal(sekcja);

    // Restore saved manual corrections (persist across F5 / batch switch)
    var sesjaId = (window._lastGate && window._lastGate.sesja_id) || null;
    if (sesjaId) {
        var saved = await _loadSavedKorekty(window.ebrId, etapId, sesjaId);
        var wodaManEl = document.getElementById('corr-manual-woda-' + sekcja);
        var kwasManEl = document.getElementById('corr-manual-kwas-' + sekcja);
        if (wodaManEl && saved['Woda łącznie'] != null) {
            wodaManEl.value = String(saved['Woda łącznie']).replace('.', ',');
        }
        if (kwasManEl && saved['Kwas cytrynowy'] != null) {
            kwasManEl.value = String(saved['Kwas cytrynowy']).replace('.', ',');
        }
        recomputeStandTotal(sekcja);
    }
}

// ═══ FD — Form Draft ═══
// One system for all temp form values. sessionStorage-backed.
// Survives: F5, batch switch, re-renders. Cleared on submit.
if (!window.FD) window.FD = {
    _key: function(id) { return 'fd_' + (window.ebrId || 0) + '_' + id; },
    set: function(id, val) { try { sessionStorage.setItem(this._key(id), val); } catch(e) {} },
    get: function(id) { try { return sessionStorage.getItem(this._key(id)); } catch(e) { return null; } },
    del: function(id) { try { sessionStorage.removeItem(this._key(id)); } catch(e) {} },
    clear: function() {
        try {
            var p = 'fd_' + (window.ebrId || 0) + '_';
            var rm = [];
            for (var i = 0; i < sessionStorage.length; i++) {
                var k = sessionStorage.key(i);
                if (k && k.startsWith(p)) rm.push(k);
            }
            rm.forEach(function(k) { sessionStorage.removeItem(k); });
        } catch(e) {}
    },
    // Fill element: draft wins over autoValue. Returns true if draft used.
    fill: function(id, el, autoValue) {
        var saved = this.get(id);
        console.log('[FD.fill]', id, 'draft=' + saved, 'auto=' + autoValue, 'elVal=' + el.value);
        if (saved !== null) { el.value = saved; return true; }
        if (autoValue != null && autoValue !== '') { el.value = autoValue; }
        return false;
    }
};

// ═══ Per-field auto-save for correction values ═══
window._pendingKorektaSaves = window._pendingKorektaSaves || [];

// Load saved korekta values for a sesja — returns { substancja: ilosc }
async function _loadSavedKorekty(ebrIdArg, etapIdArg, sesjaId) {
  if (!ebrIdArg || !etapIdArg || !sesjaId) return {};
  try {
    var resp = await fetch('/api/pipeline/lab/ebr/' + ebrIdArg + '/etap/' + etapIdArg);
    if (!resp.ok) return {};
    var data = await resp.json();
    var list = (data.sesje_korekty && (data.sesje_korekty[String(sesjaId)] || data.sesje_korekty[sesjaId])) || [];
    var map = {};
    list.forEach(function(k) {
      if (k && k.substancja != null && k.ilosc != null) {
        map[k.substancja] = k.ilosc;
      }
    });
    return map;
  } catch (e) {
    console.warn('[_loadSavedKorekty]', e);
    return {};
  }
}

function saveKorektaField(input) {
  var ebrId = parseInt(input.dataset.ebrId, 10);
  var etapId = parseInt(input.dataset.etapId, 10);
  var substancja = input.dataset.substancja;
  if (!ebrId || !etapId || !substancja) {
    console.warn('saveKorektaField: missing data attrs on input', input);
    return Promise.resolve();
  }

  var raw = (input.value || '').trim().replace(',', '.');
  var ilosc = raw === '' ? null : parseFloat(raw);
  if (ilosc !== null && isNaN(ilosc)) return Promise.resolve();
  var suggested = parseFloat(input.dataset.suggested);
  var ilosc_wyliczona = isFinite(suggested) ? suggested : null;

  input.classList.remove('corr-error', 'corr-saved');
  input.classList.add('corr-saving');

  var promise = fetch('/api/pipeline/lab/ebr/' + ebrId + '/korekta', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      etap_id: etapId,
      substancja: substancja,
      ilosc: ilosc,
      ilosc_wyliczona: ilosc_wyliczona,
    }),
  }).then(function(r) {
    input.classList.remove('corr-saving');
    if (!r.ok) {
      input.classList.add('corr-error');
      throw new Error('save failed: ' + r.status);
    }
    input.classList.add('corr-saved');
    setTimeout(function() { input.classList.remove('corr-saved'); }, 800);
    return r.json();
  }).catch(function(e) {
    input.classList.remove('corr-saving');
    input.classList.add('corr-error');
    console.error('saveKorektaField error:', e);
  });

  window._pendingKorektaSaves.push(promise);
  var cleanup = function() {
    var idx = window._pendingKorektaSaves.indexOf(promise);
    if (idx >= 0) window._pendingKorektaSaves.splice(idx, 1);
  };
  promise.then(cleanup, cleanup);
  return promise;
}

function recomputeStandV2(sekcja) {
    var nd20 = _parsePl(document.getElementById('corr-nd20-wynik-' + sekcja)?.value);
    var ph = _parsePl(document.getElementById('corr-ph-wynik-' + sekcja)?.value);
    var Meff = _parsePl(document.getElementById('corr-meff-st-' + sekcja)?.value);
    var tNd20 = _parsePl(document.getElementById('corr-target-nd20-' + sekcja)?.value);
    var tPh = _parsePl(document.getElementById('corr-target-ph-' + sekcja)?.value);

    // Woda: (R0 - Rk) * Meff / (Rk - 1.333)
    var wodaCalcEl = document.getElementById('corr-woda-calc-' + sekcja);
    var wodaManEl = document.getElementById('corr-manual-woda-' + sekcja);
    if (wodaCalcEl) {
        if (!isNaN(nd20) && !isNaN(tNd20) && !isNaN(Meff) && (tNd20 - 1.333) > 0) {
            var woda = (nd20 - tNd20) * Meff / (tNd20 - 1.333);
            if (!isFinite(woda) || woda < 0) woda = 0;
            var wFmt = woda.toFixed(1).replace('.', ',');
            wodaCalcEl.textContent = wFmt + ' kg';
            if (wodaManEl) {
                wodaManEl.dataset.suggested = woda.toFixed(1);
                if (!wodaManEl.value) wodaManEl.value = wFmt;
            }
        } else {
            wodaCalcEl.textContent = '\u2014 kg';
        }
    }

    // Kwas cytrynowy: Linear(pH, masa) model
    // coef = intercept + b_ph * pH_start + b_masa * masa_kg
    // dawka = coef * masa_eff_kg * (pH_start - pH_target)
    // masa_eff_kg = Meff + woda_kg - kwas_kg (≈ Meff + woda for prediction)
    var kwasCalcEl = document.getElementById('corr-kwas-calc-' + sekcja);
    var kwasManEl = document.getElementById('corr-manual-kwas-' + sekcja);
    if (kwasCalcEl) {
        if (!isNaN(ph) && !isNaN(tPh) && !isNaN(Meff) && Meff > 0) {
            var wodaKg = 0;
            if (wodaManEl && wodaManEl.value) {
                wodaKg = _parsePl(wodaManEl.value);
                if (isNaN(wodaKg)) wodaKg = 0;
            }
            var masaEffKg = Meff + wodaKg;
            var masaKg = ebrNastaw || Meff;
            var kwas = _acidModelPredict(ph, tPh, masaKg, masaEffKg);
            if (kwas !== null) {
                var kFmt = kwas.toFixed(1).replace('.', ',');
                kwasCalcEl.textContent = kFmt + ' kg';
                if (kwasManEl) {
                    kwasManEl.dataset.suggested = kwas.toFixed(1);
                    if (!kwasManEl.value) kwasManEl.value = kFmt;
                }
            } else {
                kwasCalcEl.textContent = '\u2014 kg';
            }
        } else {
            kwasCalcEl.textContent = '\u2014 kg';
        }
    }

    recomputeStandTotal(sekcja);
}

// Acid estimation model — DIRECT regression
// Trained on data/kwas.csv (45 obs, LOO-CV MAE=5.06 kg, MAPE=6.1%)
// kwas = -524.86 + 0.010864 * masa_eff + 9.2878 * delta_pH + 33.218 * pH_start + 488181 / masa_kg
function _acidModelPredict(phStart, phTarget, masaKg, masaEffKg) {
    var deltaPh = phStart - phTarget;
    if (deltaPh <= 0 || masaKg <= 0 || masaEffKg <= 0) return null;
    var dawka = -524.86 + 0.010864 * masaEffKg + 9.2878 * deltaPh + 33.218 * phStart + 488181 / masaKg;
    if (!isFinite(dawka) || dawka < 0) return 0;
    return dawka;
}

function recomputeStandTotal(sekcja) {
    var wodaEl = document.getElementById('corr-manual-woda-' + sekcja);
    var kwasEl = document.getElementById('corr-manual-kwas-' + sekcja);
    var totalEl = document.getElementById('corr-total-woda-' + sekcja);
    if (!totalEl) return;
    function parseNum(el) {
        if (!el) return 0;
        var raw = (el.value || '').trim().replace(',', '.');
        var n = parseFloat(raw);
        return isFinite(n) ? n : 0;
    }
    var total = parseNum(wodaEl) + parseNum(kwasEl);
    totalEl.value = total > 0 ? total.toFixed(1).replace(',', '.').replace('.', ',') : '';
}

function saveStandV2Targets(sekcja, etapId, produkt) {
    var tNd20 = _parsePl(document.getElementById('corr-target-nd20-' + sekcja)?.value);
    var tPh = _parsePl(document.getElementById('corr-target-ph-' + sekcja)?.value);
    fetch('/api/pipeline/lab/correction-targets/' + etapId + '/' + encodeURIComponent(produkt), {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            target_nd20: isNaN(tNd20) ? null : tNd20,
            target_ph: isNaN(tPh) ? null : tPh
        })
    });
}

async function advanceStandNewRound(sekcja) {
    var gate = window._lastGate;
    if (!gate || !gate.etap_id || !gate.sesja_id) return;

    // Flush any in-flight per-field auto-saves before closing the session
    if (window._pendingKorektaSaves && window._pendingKorektaSaves.length > 0) {
        await Promise.allSettled(window._pendingKorektaSaves.slice());
    }

    FD.clear();

    // Close session + start new round
    await fetch('/api/pipeline/lab/ebr/' + ebrId + '/etap/' + gate.etap_id + '/close', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ sesja_id: gate.sesja_id, decyzja: 'new_round' })
    });

    if (typeof loadBatch === 'function') loadBatch(ebrId);
    else location.reload();
}

async function approveStandWithUwagi(sekcja) {
    var gate = window._lastGate;
    if (!gate || !gate.etap_id || !gate.sesja_id) return;

    var uwagi = prompt('Wpisz uwagę dotyczącą małej korekty (np. "mały dodatek wody 5kg, pominięto powtórną analizę"):');
    if (uwagi === null) return;
    if (!uwagi.trim()) { alert('Uwaga nie może być pusta.'); return; }

    // Flush any in-flight per-field auto-saves before closing the session
    if (window._pendingKorektaSaves && window._pendingKorektaSaves.length > 0) {
        await Promise.allSettled(window._pendingKorektaSaves.slice());
    }

    FD.clear();

    // Close stage with pass (override gate) + save uwagi
    await fetch('/api/pipeline/lab/ebr/' + ebrId + '/etap/' + gate.etap_id + '/close', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ sesja_id: gate.sesja_id, decyzja: 'przejscie', komentarz: uwagi })
    });

    // Save uwagi_koncowe
    await fetch('/api/ebr/' + ebrId + '/uwagi', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},

    });

function _parsePl(val) {
    if (val == null || val === '') return NaN;
    return parseFloat(String(val).replace(',', '.'));
}

function recomputePerhydrol(sekcja) {
    var C_so3 = _parsePl(document.getElementById('corr-so3-wynik-' + sekcja)?.value);
    var Meff  = _parsePl(document.getElementById('corr-meff-' + sekcja)?.value);
    var target_so3 = _parsePl(document.getElementById('corr-target-so3-' + sekcja)?.value);
    var target_nadtlenki = _parsePl(document.getElementById('corr-target-nadt-' + sekcja)?.value);

    var resultEl = document.getElementById('corr-result-' + sekcja);
    if (!resultEl) return;

    var calcEl = document.getElementById('corr-calc-val-' + sekcja);
    var manualEl = document.getElementById('corr-manual-kg-' + sekcja);

    if (isNaN(C_so3) || isNaN(Meff) || Meff <= 0) {
        if (calcEl) calcEl.textContent = '\u2014 kg';
        return;
    }

    if (isNaN(target_so3)) target_so3 = 0;
    if (isNaN(target_nadtlenki)) target_nadtlenki = 0;

    // Formula: (C_so3 - target_so3) * 0.01214 * Meff + (target_nadtlenki > 0 ? target_nadtlenki * Meff / 350 : 0)
    var dawka = (C_so3 - target_so3) * 0.01214 * Meff;
    if (target_nadtlenki > 0) {
        dawka += target_nadtlenki * Meff / 350;
    }
    if (!isFinite(dawka) || dawka < 0) dawka = 0;
    var formatted = dawka.toFixed(1).replace('.', ',');

    if (calcEl) calcEl.textContent = formatted + ' kg';
    if (manualEl) {
        manualEl.dataset.suggested = dawka.toFixed(1);
        if (!manualEl.value) manualEl.value = formatted;
    }
}

function recomputeStandaryzacja(sekcja) {
    var wynikSm   = _parsePl(document.getElementById('corr-sm-wynik-' + sekcja)?.value);
    var celSm     = _parsePl(document.getElementById('corr-sm-cel-' + sekcja)?.value);
    var wynikNacl = _parsePl(document.getElementById('corr-nacl-wynik-' + sekcja)?.value);
    var celNacl   = _parsePl(document.getElementById('corr-nacl-cel-' + sekcja)?.value);
    var masa      = _parsePl(document.getElementById('corr-masa-' + sekcja)?.value);

    var wodaEl = document.getElementById('corr-result-woda-' + sekcja);
    var naclEl = document.getElementById('corr-result-nacl-' + sekcja);
    if (!wodaEl || !naclEl) return;

    var wodaValid = !isNaN(wynikSm) && !isNaN(celSm) && !isNaN(masa) && wynikSm !== 0;
    var naclValid = !isNaN(wynikNacl) && !isNaN(celNacl) && !isNaN(masa);

    if (wodaValid) {
        var woda = masa * (1 - celSm / wynikSm);
        if (!isFinite(woda) || woda < 0) woda = 0;
        wodaEl.innerHTML =
            '<div style="font-size:11px;color:var(--muted, #94a3b8);">Woda</div>' +
            '<div style="font-size:20px;font-weight:700;font-family:var(--mono, monospace);color:var(--teal, #14b8a6);margin-top:4px;">' + woda.toFixed(2).replace('.', ',') + ' kg</div>';
    } else {
        wodaEl.innerHTML =
            '<div style="font-size:11px;color:var(--muted, #94a3b8);">Woda</div>' +
            '<div style="font-size:20px;font-weight:700;font-family:var(--mono, monospace);color:var(--teal, #14b8a6);margin-top:4px;">&mdash; kg</div>';
    }

    if (naclValid) {
        var nacl = masa * (celNacl - wynikNacl) / 100;
        if (!isFinite(nacl) || nacl < 0) nacl = 0;
        naclEl.innerHTML =
            '<div style="font-size:11px;color:var(--muted, #94a3b8);">NaCl</div>' +
            '<div style="font-size:20px;font-weight:700;font-family:var(--mono, monospace);color:var(--teal, #14b8a6);margin-top:4px;">' + nacl.toFixed(2).replace('.', ',') + ' kg</div>';
    } else {
        naclEl.innerHTML =
            '<div style="font-size:11px;color:var(--muted, #94a3b8);">NaCl</div>' +
            '<div style="font-size:20px;font-weight:700;font-family:var(--mono, monospace);color:var(--teal, #14b8a6);margin-top:4px;">&mdash; kg</div>';
    }
}

function _getCorrectionContext(sekcja) {
    var baseSekcja = sekcja.split('__')[0];
    var activeEtap = etapy.find(function(e) { return e.sekcja_lab === baseSekcja; });
    var etapKod = activeEtap ? (activeEtap.kod || activeEtap.sekcja_lab || '') : '';

    // Get measurement values from wyniki
    var sekWyniki = wyniki[sekcja] || wyniki[baseSekcja] || {};

    // Get spec/target values from parametry
    var pola = (parametry[baseSekcja] || {}).pola || [];

    function getWynik(kod) {
        var w = sekWyniki[kod];
        return w ? w.wartosc : null;
    }

    function getTarget(kod) {
        var p = pola.find(function(x) { return x.kod === kod; });
        return p ? (p.spec_value || p.target || null) : null;
    }

    var masa = ebrNastaw || null;

    return {
        etapKod: etapKod,
        getWynik: getWynik,
        getTarget: getTarget,
        masa: masa
    };
}

function tryRenderCorrectionAfterGate(sekcja) {
    var ctx = _getCorrectionContext(sekcja);
    var produkt = window._batchProdukt || '';

    if (ctx.etapKod === 'sulfonowanie') {
        var activeEtap = etapy.find(function(e) { return e.sekcja_lab === 'sulfonowanie'; });

            wynik_so3:   ctx.getWynik('so3'),

            etap_id:     activeEtap ? activeEtap.pipeline_etap_id : 0,

    } else if (ctx.etapKod === 'utlenienie') {
        var utlEtap = etapy.find(function(e) { return e.sekcja_lab === 'utlenienie'; });
        var etapId = utlEtap ? utlEtap.pipeline_etap_id : 0;

        if (window._gatePassAction === 'new_round_utl') {

                etap_id:     etapId,
                produkt:     produkt,
            });
        } else {
            // Utlenienie PASS → show woda + kwas cytrynowy panel
            renderCorrectionPanel('standaryzacja_v2', sekcja, {
                wynik_nd20:  ctx.getWynik('nd20'),
                wynik_ph:    ctx.getWynik('ph_10proc'),

        var standEtap = etapy.find(function(e) { return e.kod === 'standaryzacja'; });
        var standEtapId = standEtap ? standEtap.pipeline_etap_id : 0;

        if (window._gatePassAction === 'pompuj') {

                            '<span class="gate-badge gate-badge-ok">PASS</span>' +

                        '</div>' +
                    '</div>';
            }
        } else {
            // FAIL (pH/nD20 out of range) → show correction panel
            renderCorrectionPanel('standaryzacja_v2', sekcja, {
                wynik_nd20:  ctx.getWynik('nd20'),
                wynik_ph:    ctx.getWynik('ph_10proc'),
                masa_szarzy: ctx.masa,
                etap_id:     standEtapId,
                produkt:     produkt,
            });
        }
    }
}

// Update correction panel measurement inputs after a field save
// Called when gate-skip prevented re-render but analytical values changed
function _updateCorrPanelMeasurements(sekcja) {
    var baseSekcja = sekcja.split('__')[0];
    var sek = wyniki[baseSekcja] || wyniki[sekcja] || {};

    // Standaryzacja V2 panel: update nD20 + pH wynik fields → recalculate
    var nd20El = document.getElementById('corr-nd20-wynik-' + sekcja) ||
                 document.getElementById('corr-nd20-wynik-' + baseSekcja);
    var phEl = document.getElementById('corr-ph-wynik-' + sekcja) ||
               document.getElementById('corr-ph-wynik-' + baseSekcja);
    var updated = false;
    if (nd20El && sek['nd20']) {
        var newNd20 = String(sek['nd20'].wartosc).replace('.', ',');
        if (nd20El.value !== newNd20) { nd20El.value = newNd20; updated = true; }
    }
    if (phEl && sek['ph_10proc']) {
        var newPh = String(sek['ph_10proc'].wartosc).replace('.', ',');
        if (phEl.value !== newPh) { phEl.value = newPh; updated = true; }
    }
    if (updated) {
        // Measurement changed → clear manual inputs so recompute sets fresh suggestions
        var wodaManEl = document.getElementById('corr-manual-woda-' + sekcja);
        var kwasManEl = document.getElementById('corr-manual-kwas-' + sekcja);
        var totalEl = document.getElementById('corr-total-woda-' + sekcja);
        if (wodaManEl) wodaManEl.value = '';
        if (kwasManEl) kwasManEl.value = '';
        if (totalEl) totalEl.value = '';
        // Recalculate with fresh suggestions
        if (typeof recomputeStandV2 === 'function') recomputeStandV2(sekcja);
    }

    // Perhydrol panel: update SO3 wynik → recalculate
    var so3El = document.getElementById('corr-so3-wynik-' + sekcja) ||
                document.getElementById('corr-so3-wynik-' + baseSekcja);
    if (so3El && sek['so3']) {
        var newSo3 = String(sek['so3'].wartosc).replace('.', ',');
        if (so3El.value !== newSo3) {
            so3El.value = newSo3;
            // Measurement changed → clear manual input so recompute sets fresh suggestion
            var perhydrolManEl = document.getElementById('corr-manual-kg-' + sekcja);
            if (perhydrolManEl) perhydrolManEl.value = '';
            if (typeof recomputePerhydrol === 'function') recomputePerhydrol(sekcja);
        }
    }
}
</script>
