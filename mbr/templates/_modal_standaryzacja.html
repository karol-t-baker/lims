{# ═══ KALKULATOR STANDARYZACJI — global modal (base.html) ═══ #}
<div class="sc-overlay" id="sc-overlay" onclick="if(event.target===this)closeStanModal()">
  <div class="sc-modal">
    <div class="sc-ribbon"></div>
    <div class="sc-top">
      <span class="sc-top-title">Kalkulator standaryzacji</span>
      <span style="margin-left:6px;font-size:9px;color:var(--text-dim);">S</span>
      <button class="sc-top-close" onclick="closeStanModal()">&times;</button>
    </div>
    <div class="sc-body" id="sc-body"></div>
    <div class="sc-summary" id="sc-summary"></div>
  </div>
</div>

<style>
.sc-overlay { position:fixed;inset:0;background:rgba(26,26,26,0.5);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:200; }
.sc-overlay.show { display:flex;animation:scFadeIn .18s ease; }
@keyframes scFadeIn { from{opacity:0}to{opacity:1} }
.sc-modal { width:94vw;max-height:90vh;background:var(--surface);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 56px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.06);animation:scSlideUp .22s cubic-bezier(.2,.9,.3,1); }
@keyframes scSlideUp { from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)} }
.sc-ribbon { height:3px;background:linear-gradient(90deg,var(--stage-stand),#a855f7,var(--stage-stand));flex-shrink:0; }
.sc-top { display:flex;align-items:center;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0; }
.sc-top-title { font-size:15px;font-weight:700;color:var(--text); }
.sc-top-close { margin-left:auto;background:none;border:none;font-size:22px;color:var(--text-dim);cursor:pointer;width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1; }
.sc-top-close:hover { background:var(--red-bg);color:var(--red); }

.sc-body { flex:1;overflow-y:auto;padding:20px 28px; }
.sc-body::-webkit-scrollbar { width:3px; } .sc-body::-webkit-scrollbar-thumb { background:var(--border);border-radius:3px; }

/* Product tiles */
.sc-tiles { display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap; }
.sc-tile { padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s;font-size:14px;color:var(--text-sec);background:var(--surface); }
.sc-tile:hover { border-color:var(--stage-stand);color:var(--stage-stand); }
.sc-tile.act { background:var(--stage-stand-bg);border-color:var(--stage-stand);color:var(--stage-stand);font-weight:600; }
.sc-tile-rk { font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-top:2px; }
.sc-tile.act .sc-tile-rk { color:var(--stage-stand); }

/* Section */
.sc-section { margin-bottom:18px;border:1px solid var(--border-subtle);border-radius:10px;overflow:hidden; }
.sc-sec-hdr { display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--surface-alt); }
.sc-step { width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0; }
.sc-sec-title { font-size:14px;font-weight:700;color:var(--text); }
.sc-sec-res { margin-left:auto;font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text-dim); }
.sc-sec-res.has-val { color:var(--stage-stand); }
.sc-sec-body { padding:14px 18px;display:grid;gap:10px; }
.sc-fg { }
.sc-lbl { font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px; }
.sc-inp { width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:15px;font-family:var(--mono);text-align:center;background:var(--surface);color:var(--text);-moz-appearance:textfield; }
.sc-inp::-webkit-outer-spin-button,.sc-inp::-webkit-inner-spin-button { -webkit-appearance:none;margin:0; }
.sc-inp:focus { border-color:var(--stage-stand);outline:none;box-shadow:0 0 0 3px var(--stage-stand-bg); }
.sc-inp::placeholder { color:var(--border);font-size:10px; }
.sc-formula { font-size:11px;color:var(--text-dim);font-family:var(--mono);padding:6px 18px 10px; }

/* Summary footer */
.sc-summary { flex-shrink:0;padding:14px 24px;border-top:1px solid var(--border);background:var(--surface-alt);display:flex;gap:20px;align-items:center; }
.sc-sum-item { }
.sc-sum-lbl { font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim); }
.sc-sum-val { font-size:22px;font-weight:700;font-family:var(--mono);color:var(--text); }
.sc-sum-val.accent { color:var(--stage-stand); }
.sc-sum-unit { font-size:12px;color:var(--text-dim);margin-left:2px; }
.sc-sum-total { margin-left:auto;text-align:right; }
.sc-sum-total .sc-sum-val { font-size:28px;color:var(--stage-stand); }
</style>

<script>
var _scProducts = [
  {id:'kk',  name:'Chegina KK',             Rk:1.3911, den:0.0581},
  {id:'k7',  name:'Chegina K7',             Rk:1.3922, den:0.0592},
  {id:'k40', name:'K40 GLOL/GLO/GL',        Rk:1.4070, den:0.0740},
  {id:'chx', name:'Cheminox K',             Rk:1.3840, den:0.0510},
];
var _sc = {produkt:'kk', nastaw:'', R0:'', pH0:'', pHk:'', kwas:'', Ccl:'', Ck:''};

function openStanModal(){
  document.getElementById('sc-overlay').classList.add('show');
  scRender();
}
function closeStanModal(){ document.getElementById('sc-overlay').classList.remove('show'); }
function toggleStanModal(){
  var ov=document.getElementById('sc-overlay');
  if(ov.classList.contains('show')) closeStanModal(); else openStanModal();
}

function scRender(){
  var prod = _scProducts.find(function(p){return p.id===_sc.produkt}) || _scProducts[0];
  var tiles = _scProducts.map(function(p){
    return '<div class="sc-tile'+(p.id===_sc.produkt?' act':'')+'" onclick="_sc.produkt=\''+p.id+'\';scRender()">'+
      '<div>'+p.name+'</div><div class="sc-tile-rk">Rk = '+p.Rk+'</div></div>';
  }).join('');

  // Calculate results
  var res = scCalc(prod);

  var body = document.getElementById('sc-body');

  // Section 3 result — NaCl or final concentration after dilution
  var sec3res = res.nacl !== null ? res.nacl.toFixed(2).replace('.',',')+' kg' : (res.clKoncowe !== null ? 'Cl\u207b po rozcie\u0144czeniu: '+res.clKoncowe.toFixed(3).replace('.',',')+'%' : '\u2014');
  var sec3cls = (res.nacl !== null || res.clKoncowe !== null) ? ' has-val' : '';

  body.innerHTML =
    '<div class="sc-tiles">'+tiles+'</div>'+

    // Section 1: Woda (refrakcja)
    '<div class="sc-section">'+
      '<div class="sc-sec-hdr"><div class="sc-step" style="background:var(--teal)">1</div><div class="sc-sec-title">Refrakcja \u2014 korekta wody</div>'+
        '<div class="sc-sec-res'+(res.woda!==null?' has-val':'')+'">'+( res.woda!==null?res.woda.toFixed(1).replace('.',',')+' kg':'\u2014')+'</div></div>'+
      '<div class="sc-sec-body" style="grid-template-columns:1fr 1fr">'+
        '<div class="sc-fg"><div class="sc-lbl">Masa nastawu [kg]</div><input class="sc-inp" type="number" inputmode="decimal" placeholder="np. 6500" value="'+_sc.nastaw+'" oninput="_sc.nastaw=this.value;scUpdate()"></div>'+
        '<div class="sc-fg"><div class="sc-lbl">Refrakcja R\u2080</div><input class="sc-inp" type="number" inputmode="decimal" step="0.0001" placeholder="np. 1.4120" value="'+_sc.R0+'" oninput="_sc.R0=this.value;scUpdate()"></div>'+
      '</div>'+
      '<div class="sc-formula">Rk='+prod.Rk+' \u00b7 ((R\u2080\u2212Rk) \u00d7 (nastaw\u2212korekta)) / '+prod.den+'</div>'+
    '</div>'+

    // Section 2: pH — kwas
    '<div class="sc-section">'+
      '<div class="sc-sec-hdr"><div class="sc-step" style="background:var(--amber)">2</div><div class="sc-sec-title">Korekta pH \u2014 kwas</div>'+
        '<div class="sc-sec-res'+(res.kwas!==null?' has-val':'')+'">'+( res.kwas!==null?res.kwas.toFixed(2).replace('.',',')+' kg':'\u2014')+'</div></div>'+
      '<div class="sc-sec-body" style="grid-template-columns:1fr 1fr 1fr">'+
        '<div class="sc-fg"><div class="sc-lbl">pH zmierzone</div><input class="sc-inp" type="number" inputmode="decimal" step="0.01" placeholder="np. 12.0" value="'+_sc.pH0+'" oninput="_sc.pH0=this.value;scUpdate()"></div>'+
        '<div class="sc-fg"><div class="sc-lbl">pH docelowe</div><input class="sc-inp" type="number" inputmode="decimal" step="0.01" placeholder="np. 5.0" value="'+_sc.pHk+'" oninput="_sc.pHk=this.value;scUpdate()"></div>'+
        '<div class="sc-fg"><div class="sc-lbl">Kwas \u2014 dawka [kg]</div><input class="sc-inp" type="number" inputmode="decimal" placeholder="kg" value="'+_sc.kwas+'" oninput="_sc.kwas=this.value;scUpdate()"></div>'+
      '</div>'+
    '</div>'+

    // Section 3: Chlorki — NaCl
    '<div class="sc-section">'+
      '<div class="sc-sec-hdr"><div class="sc-step" style="background:var(--green)">3</div><div class="sc-sec-title">Chlorki \u2014 NaCl</div>'+
        '<div class="sc-sec-res'+sec3cls+'">'+sec3res+'</div></div>'+
      '<div class="sc-sec-body" style="grid-template-columns:1fr 1fr">'+
        '<div class="sc-fg"><div class="sc-lbl">Chlorki zmierzone [%]</div><input class="sc-inp" type="number" inputmode="decimal" step="0.01" placeholder="np. 0.35" value="'+_sc.Ccl+'" oninput="_sc.Ccl=this.value;scUpdate()"></div>'+
        '<div class="sc-fg"><div class="sc-lbl">Chlorki docelowe [%]</div><input class="sc-inp" type="number" inputmode="decimal" step="0.01" placeholder="np. 0.50" value="'+_sc.Ck+'" oninput="_sc.Ck=this.value;scUpdate()"></div>'+
      '</div>'+
    '</div>';

  scUpdateSummary(res);
}

function scCalc(prod){
  var nastaw = parseFloat(_sc.nastaw) || 0;
  var R0 = parseFloat(_sc.R0) || 0;
  var pH0 = parseFloat(_sc.pH0) || 0;
  var pHk = parseFloat(_sc.pHk) || 0;
  var kwas = parseFloat(_sc.kwas) || 0;
  var Ccl = parseFloat(_sc.Ccl) || 0;
  var Ck = parseFloat(_sc.Ck) || 0;

  var korekta = nastaw > 7000 ? 1000 : 500;
  var woda = null, nacl = null;

  // Woda z refrakcji
  if(nastaw > 0 && R0 > 0 && R0 > prod.Rk){
    woda = ((R0 - prod.Rk) * (nastaw - korekta)) / prod.den;
    if(woda < 0) woda = 0;
  }

  // NaCl + końcowe stężenie
  var Mn = nastaw > 0 ? nastaw - korekta : 0;
  var Mc = Mn + (woda || 0) + kwas;
  var clKoncowe = null;

  if(nastaw > 0 && Ck > 0 && Ccl >= 0){
    nacl = (Ck/100 * Mc - Mn * Ccl/100) / (1 - Ck/100);
    if(nacl < 0) nacl = 0;
  }

  // Jeśli nie podano Ck (docelowe) ale jest Ccl i woda — pokaż końcowe stężenie po rozcieńczeniu
  if(nastaw > 0 && Ccl > 0 && Mc > 0 && nacl === null){
    clKoncowe = (Mn * Ccl / 100) / Mc * 100;
  }

  // Woda łącznie
  var wodaTotal = (woda || 0) + kwas;

  return {woda: woda, kwas: kwas > 0 ? kwas : null, nacl: nacl, clKoncowe: clKoncowe, wodaTotal: wodaTotal};
}

function scUpdate(){
  var prod = _scProducts.find(function(p){return p.id===_sc.produkt}) || _scProducts[0];
  var res = scCalc(prod);

  // Update section results inline
  var secs = document.querySelectorAll('.sc-sec-res');
  if(secs[0]){ secs[0].textContent = res.woda !== null ? res.woda.toFixed(1).replace('.',',')+' kg' : '—'; secs[0].className = 'sc-sec-res'+(res.woda!==null?' has-val':''); }
  if(secs[1]){ secs[1].textContent = res.kwas !== null ? res.kwas.toFixed(2).replace('.',',')+' kg' : '—'; secs[1].className = 'sc-sec-res'+(res.kwas!==null?' has-val':''); }
  if(secs[2]){
    var s3txt = res.nacl !== null ? res.nacl.toFixed(2).replace('.',',')+' kg' : (res.clKoncowe !== null ? 'Cl\u207b po rozc.: '+res.clKoncowe.toFixed(3).replace('.',',')+'%' : '\u2014');
    secs[2].textContent = s3txt;
    secs[2].className = 'sc-sec-res'+((res.nacl!==null||res.clKoncowe!==null)?' has-val':'');
  }

  scUpdateSummary(res);
}

function scUpdateSummary(res){
  var el = document.getElementById('sc-summary');
  var hasAny = res.woda !== null || res.kwas !== null || res.nacl !== null;
  if(!hasAny){
    el.innerHTML = '<div style="font-size:10px;color:var(--text-dim);font-style:italic">Wprowadź dane</div>';
    return;
  }
  el.innerHTML =
    '<div class="sc-sum-item"><div class="sc-sum-lbl">Woda</div><div class="sc-sum-val">'+(res.woda!==null?res.woda.toFixed(1).replace('.',','):'—')+'<span class="sc-sum-unit">kg</span></div></div>'+
    '<div class="sc-sum-item"><div class="sc-sum-lbl">Kwas</div><div class="sc-sum-val">'+(res.kwas!==null?res.kwas.toFixed(1).replace('.',','):'—')+'<span class="sc-sum-unit">kg</span></div></div>'+
    '<div class="sc-sum-item"><div class="sc-sum-lbl">'+(res.nacl!==null?'NaCl':(res.clKoncowe!==null?'Cl\u207b ko\u0144c.':'NaCl'))+'</div><div class="sc-sum-val">'+(res.nacl!==null?res.nacl.toFixed(1).replace('.',','):(res.clKoncowe!==null?res.clKoncowe.toFixed(3).replace('.',','):'\u2014'))+'<span class="sc-sum-unit">'+(res.nacl!==null?'kg':(res.clKoncowe!==null?'%':''))+'</span></div></div>'+
    '<div class="sc-sum-total"><div class="sc-sum-lbl">Woda łącznie</div><div class="sc-sum-val accent">'+res.wodaTotal.toFixed(1).replace('.',',')+'<span class="sc-sum-unit">kg</span></div></div>';
}

// Global shortcut: S
document.addEventListener('keydown', function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='s'||e.key==='S'){
    e.preventDefault();
    toggleStanModal();
  }
  if(e.key==='Escape'){
    var ov=document.getElementById('sc-overlay');
    if(ov&&ov.classList.contains('show')){ e.preventDefault(); closeStanModal(); }
  }
});
</script>
