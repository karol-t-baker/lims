<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabCore COA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { display: flex; min-height: 100vh; margin: 0; background: var(--workspace-bg); }
    .coa-rail {
      width: 52px; min-width: 52px; background: var(--rail-bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px;
    }
    .coa-rail-logo { font-family: 'Fraunces', serif; font-weight: 900; font-size: 16px; color: var(--teal); margin-bottom: 16px; }
    .coa-rail-btn {
      width: 40px; height: 40px; border-radius: 8px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: var(--text-dim); transition: all 0.15s;
    }
    .coa-rail-btn:hover { background: var(--surface-alt); color: var(--text); }
    .coa-rail-btn.active { background: var(--teal-bg); color: var(--teal); }
    .coa-rail-btn svg { width: 20px; height: 20px; }
    .coa-rail-sp { flex: 1; }

    .coa-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .coa-topbar {
      padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; gap: 12px;
    }
    .coa-topbar-title { font-size: 14px; font-weight: 700; }
    .coa-topbar-sync {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      font-size: 10px; color: var(--text-dim);
    }
    .coa-sync-btn {
      padding: 6px 14px; background: var(--teal); color: #fff; border: none; border-radius: 6px;
      font-size: 10px; font-weight: 700; cursor: pointer; font-family: var(--font);
      transition: background 0.15s;
    }
    .coa-sync-btn:hover { background: var(--teal-dark); }
    .coa-sync-btn:disabled { opacity: 0.5; }

    .coa-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* Product tabs */
    .coa-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .coa-tab {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; font-size: 11px; font-weight: 600;
      font-family: var(--font); color: var(--text-sec); transition: all 0.15s;
    }
    .coa-tab:hover { border-color: var(--teal); color: var(--teal); }
    .coa-tab.active { background: var(--teal); color: #fff; border-color: var(--teal); }

    /* Batch list */
    .coa-batch {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border: 1px solid var(--border-subtle); border-radius: 8px; margin-bottom: 6px;
      background: #fff; cursor: pointer; transition: all 0.15s;
    }
    .coa-batch:hover { border-color: var(--teal); background: var(--teal-bg); }
    .coa-batch.active { border-color: var(--teal); background: var(--teal-bg); }
    .coa-batch-nr { font-weight: 700; font-size: 13px; min-width: 80px; }
    .coa-batch-prod { font-size: 11px; color: var(--text-sec); flex: 1; }
    .coa-batch-date { font-size: 10px; color: var(--text-dim); font-family: var(--mono); }
    .coa-batch-typ { font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .coa-batch-typ-sz { background: var(--amber-bg); color: var(--amber); }
    .coa-batch-typ-zb { background: var(--blue-bg); color: var(--blue); }

    /* Detail panel */
    .coa-detail { display: none; }
    .coa-detail.open { display: block; }
    .coa-detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .coa-detail-back {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .coa-detail-back:hover { border-color: var(--teal); }
    .coa-detail-title { font-size: 16px; font-weight: 700; }
    .coa-detail-sub { font-size: 11px; color: var(--text-dim); }

    /* Params table */
    .coa-params { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
    .coa-param {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-bottom: 1px solid var(--border-subtle); font-size: 12px;
    }
    .coa-param:last-child { border-bottom: none; }
    .coa-param-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .coa-param-dot.ok { background: var(--green); }
    .coa-param-dot.err { background: var(--red); }
    .coa-param-label { flex: 1; color: var(--text-sec); }
    .coa-param-val { font-weight: 700; font-family: var(--mono); min-width: 60px; text-align: right; }
    .coa-param-norm { font-size: 10px; color: var(--text-dim); min-width: 80px; text-align: right; }

    /* Cert section */
    .coa-certs { margin-top: 16px; }
    .coa-cert-sep { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; padding: 8px 0; }
    .coa-cert-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border: 1px solid var(--border-subtle); border-radius: 6px; margin-bottom: 4px;
      background: #fff; font-size: 11px;
    }
    .coa-cert-name { flex: 1; font-weight: 600; }
    .coa-cert-date { font-size: 10px; color: var(--text-dim); }
    .coa-issue-btn {
      padding: 8px 16px; background: var(--teal); color: #fff; border: none; border-radius: 6px;
      font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--font);
      transition: background 0.15s;
    }
    .coa-issue-btn:hover { background: var(--teal-dark); }
    .coa-issue-btn:disabled { opacity: 0.5; }

    /* Settings panel */
    .coa-settings { padding: 20px; }
    .coa-setting-row { margin-bottom: 16px; }
    .coa-setting-label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .coa-setting-input {
      width: 100%; max-width: 400px; padding: 8px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 12px; font-family: var(--mono);
    }
    .coa-setting-input:focus { border-color: var(--teal); outline: none; }

    /* Flash */
    .coa-flash { padding: 8px 14px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; display: none; }
    .coa-flash.ok { background: var(--green-bg, #f0fdf4); color: var(--green); display: block; }
    .coa-flash.err { background: var(--red-bg, #fef2f2); color: var(--red); display: block; }

    /* Popup for extra fields */
    .coa-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .coa-popup-overlay.active { display: flex; }
    .coa-popup { background: var(--surface); border-radius: 12px; padding: 20px; width: 360px; }
    .coa-popup h3 { margin: 0 0 14px; font-size: 14px; }
    .coa-popup-field { margin-bottom: 10px; }
    .coa-popup-field label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); margin-bottom: 3px; }
    .coa-popup-field input { width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; }
    .coa-popup-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  </style>
</head>
<body>

<div class="coa-rail">
  <div class="coa-rail-logo">LC</div>
  <button class="coa-rail-btn active" id="nav-list" onclick="showView('list')" title="Ukończone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
  </button>
  <button class="coa-rail-btn" id="nav-settings" onclick="showView('settings')" title="Ustawienia">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.82a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001.08 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09c-.658.003-1.25.396-1.51 1z"/></svg>
  </button>
  <div class="coa-rail-sp"></div>
</div>

<div class="coa-main">
  <div class="coa-topbar">
    <div class="coa-topbar-title" id="topbar-title">Ukończone szarże</div>
    <div class="coa-topbar-sync">
      <span id="sync-status"></span>
      <button class="coa-sync-btn" id="sync-btn" onclick="doSync()">Synchronizuj</button>
    </div>
  </div>

  <div class="coa-content" id="view-list">
    <div class="coa-tabs" id="product-tabs"></div>
    <div id="batch-list"></div>
  </div>

  <div class="coa-content coa-detail" id="view-detail"></div>

  <div class="coa-content coa-settings" id="view-settings" style="display:none;">
    <div class="coa-setting-row">
      <div class="coa-setting-label">Adres serwera</div>
      <input class="coa-setting-input" id="set-server" placeholder="https://192.168.100.171">
    </div>
    <div class="coa-setting-row">
      <div class="coa-setting-label">Folder zapisu świadectw</div>
      <input class="coa-setting-input" id="set-output" placeholder="D:\Swiadectwa">
    </div>
    <button class="coa-sync-btn" onclick="saveSettings()">Zapisz</button>
    <div class="coa-flash" id="settings-flash"></div>
  </div>
</div>

<!-- Extra fields popup -->
<div class="coa-popup-overlay" id="popup-overlay" onclick="if(event.target===this)closePopup()">
  <div class="coa-popup">
    <h3>Dodatkowe dane</h3>
    <div id="popup-fields"></div>
    <div class="coa-popup-actions">
      <button class="btn btn-o" onclick="closePopup()">Anuluj</button>
      <button class="coa-issue-btn" onclick="confirmPopup()">Wystaw</button>
    </div>
  </div>
</div>

<script>
var _batches = [];
var _products = [];
var _currentProduct = '';
var _pendingIssue = null;

// --- Views ---
function showView(view) {
  document.getElementById('view-list').style.display = view === 'list' ? '' : 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-detail').classList.remove('open');
  document.getElementById('view-settings').style.display = view === 'settings' ? '' : 'none';
  document.getElementById('nav-list').classList.toggle('active', view === 'list');
  document.getElementById('nav-settings').classList.toggle('active', view === 'settings');
  document.getElementById('topbar-title').textContent = view === 'list' ? 'Ukończone szarże' : 'Ustawienia';
  if (view === 'settings') loadSettings();
}

// --- Sync ---
async function doSync() {
  var btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = 'Synchronizacja...';
  try {
    var r = await fetch('/api/sync', {method: 'POST'});
    var d = await r.json();
    if (d.ok) {
      document.getElementById('sync-status').textContent = 'Zsynchronizowano (' + d.size_kb + ' KB)';
      loadBatches();
    } else {
      document.getElementById('sync-status').textContent = 'Błąd: ' + d.error;
    }
  } catch(e) { document.getElementById('sync-status').textContent = 'Błąd: ' + e.message; }
  btn.disabled = false; btn.textContent = 'Synchronizuj';
}

// --- Batches ---
async function loadBatches() {
  var r = await fetch('/api/completed');
  var d = await r.json();
  _batches = d.batches;
  _products = d.products;
  renderTabs();
  if (_products.length && !_currentProduct) _currentProduct = _products[0];
  renderBatches();
}

function renderTabs() {
  var html = '';
  _products.forEach(function(p) {
    var short = p.replace('Chegina_', '').replace('_', ' ');
    html += '<div class="coa-tab' + (p === _currentProduct ? ' active' : '') + '" onclick="selectProduct(\'' + p + '\')">' + short + '</div>';
  });
  document.getElementById('product-tabs').innerHTML = html;
}

function selectProduct(p) {
  _currentProduct = p;
  renderTabs();
  renderBatches();
}

function renderBatches() {
  var filtered = _batches.filter(function(b) { return b.produkt === _currentProduct; });
  if (!filtered.length) {
    document.getElementById('batch-list').innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:20px;">Brak ukończonych szarż.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(b) {
    var typCls = b.typ === 'zbiornik' ? 'coa-batch-typ-zb' : 'coa-batch-typ-sz';
    var typLabel = b.typ === 'zbiornik' ? 'ZB' : 'SZ';
    html += '<div class="coa-batch" onclick="openDetail(' + b.ebr_id + ')">' +
      '<span class="coa-batch-nr">' + b.nr_partii + '</span>' +
      '<span class="coa-batch-typ ' + typCls + '">' + typLabel + '</span>' +
      '<span class="coa-batch-prod">' + b.produkt.replace(/_/g, ' ') + '</span>' +
      '<span class="coa-batch-date">' + (b.dt_end || '').substring(0, 10) + '</span>' +
    '</div>';
  });
  document.getElementById('batch-list').innerHTML = html;
}

// --- Detail ---
async function openDetail(ebrId) {
  var r = await fetch('/api/ebr/' + ebrId);
  var ebr = await r.json();

  var plab = JSON.parse(ebr.parametry_lab || '{}');
  // Find pola — try analiza_koncowa, analiza, or first section
  var pola = [];
  if (plab.analiza_koncowa) pola = plab.analiza_koncowa.pola || [];
  else if (plab.analiza) pola = plab.analiza.pola || [];
  else { var k = Object.keys(plab)[0]; if (k) pola = (plab[k].pola || []); }

  var html = '<div class="coa-detail-head">' +
    '<button class="coa-detail-back" onclick="closeDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>' +
    '<div><div class="coa-detail-title">' + ebr.produkt.replace(/_/g, ' ') + ' — ' + ebr.nr_partii + '</div>' +
    '<div class="coa-detail-sub">' + (ebr.typ === 'zbiornik' ? 'Zbiornik' + (ebr.nr_zbiornika ? ' ' + ebr.nr_zbiornika : '') : 'Szarża') + ' · ' + (ebr.dt_end || '').substring(0, 10) + '</div></div></div>';

  // Params
  html += '<div class="coa-params">';
  pola.forEach(function(p) {
    var w = ebr.wyniki[p.kod];
    var val = w ? String(w.wartosc).replace('.', ',') : '—';
    var ok = w ? w.w_limicie === 1 : true;
    var norm = '';
    if (p.min != null && p.max != null) norm = p.min + ' – ' + p.max;
    else if (p.min != null) norm = '> ' + p.min;
    else if (p.max != null) norm = '< ' + p.max;
    html += '<div class="coa-param">' +
      '<div class="coa-param-dot ' + (ok ? 'ok' : 'err') + '"></div>' +
      '<span class="coa-param-label">' + (p.label || p.kod) + '</span>' +
      '<span class="coa-param-val">' + val + '</span>' +
      '<span class="coa-param-norm">' + norm + '</span>' +
    '</div>';
  });
  html += '</div>';

  // Issued certs
  html += '<div class="coa-certs">';
  if (ebr.certs && ebr.certs.length) {
    html += '<div class="coa-cert-sep">Wystawione</div>';
    ebr.certs.forEach(function(c) {
      html += '<div class="coa-cert-row"><span class="coa-cert-name">' + c.template_name + '</span><span class="coa-cert-date">' + (c.dt_wystawienia || '').substring(0, 10) + ' · ' + (c.wystawil || '') + '</span></div>';
    });
  }

  // Issue new
  html += '<div class="coa-cert-sep">Wystaw nowe</div>';
  html += '<div id="cert-templates" data-ebr-id="' + ebrId + '" data-produkt="' + ebr.produkt + '">Ładowanie...</div>';
  html += '</div>';

  document.getElementById('view-list').style.display = 'none';
  var detail = document.getElementById('view-detail');
  detail.innerHTML = html;
  detail.style.display = '';
  detail.classList.add('open');

  // Load templates
  var tr = await fetch('/api/cert/templates?produkt=' + encodeURIComponent(ebr.produkt));
  var td = await tr.json();
  var thtml = '';
  td.templates.forEach(function(t) {
    thtml += '<button class="coa-issue-btn" style="margin:0 6px 6px 0;" onclick=\'issueCert(this,' + ebrId + ',"' + t.id + '",' + JSON.stringify(t.required_fields) + ')\'>' + t.label + '</button>';
  });
  document.getElementById('cert-templates').innerHTML = thtml || '<span style="color:var(--text-dim);font-size:11px;">Brak szablonów</span>';
}

function closeDetail() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-detail').classList.remove('open');
  document.getElementById('view-list').style.display = '';
}

// --- Issue cert ---
function issueCert(btn, ebrId, variantId, requiredFields) {
  if (!requiredFields || !requiredFields.length) {
    doIssueCert(btn, ebrId, variantId, {});
    return;
  }
  _pendingIssue = {btn: btn, ebrId: ebrId, variantId: variantId};
  var fieldDefs = {
    'has_order_number': {label: 'Numer zamówienia / Order No.', key: 'order_number'},
    'has_certificate_number': {label: 'Numer certyfikatu / Certificate No.', key: 'certificate_number'},
    'has_avon_code': {label: 'Kod AVON', key: 'avon_code'},
    'has_avon_name': {label: 'Nazwa AVON (INCI)', key: 'avon_name'},
  };
  var html = '';
  requiredFields.forEach(function(f) {
    var d = fieldDefs[f];
    if (d) html += '<div class="coa-popup-field"><label>' + d.label + '</label><input type="text" data-key="' + d.key + '"></div>';
  });
  document.getElementById('popup-fields').innerHTML = html;
  document.getElementById('popup-overlay').classList.add('active');
  var first = document.querySelector('#popup-fields input');
  if (first) setTimeout(function() { first.focus(); }, 100);
}

function closePopup() { document.getElementById('popup-overlay').classList.remove('active'); _pendingIssue = null; }

function confirmPopup() {
  var extra = {};
  var valid = true;
  document.querySelectorAll('#popup-fields input').forEach(function(inp) {
    var v = inp.value.trim();
    if (!v) { inp.style.borderColor = '#ef4444'; valid = false; } else { inp.style.borderColor = ''; }
    extra[inp.dataset.key] = v;
  });
  if (!valid) return;
  var p = _pendingIssue;
  closePopup();
  doIssueCert(p.btn, p.ebrId, p.variantId, extra);
}

async function doIssueCert(btn, ebrId, variantId, extraFields) {
  btn.disabled = true;
  var orig = btn.textContent;
  btn.textContent = 'Generowanie...';
  try {
    var r = await fetch('/api/cert/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ebr_id: ebrId, variant_id: variantId, extra_fields: extraFields, wystawil: ''})
    });
    var d = await r.json();
    if (d.ok) {
      btn.textContent = 'Zapisano!';
      btn.style.background = 'var(--green)';
      setTimeout(function() { btn.textContent = orig; btn.style.background = ''; btn.disabled = false; }, 2000);
    } else {
      alert('Błąd: ' + d.error);
      btn.textContent = orig; btn.disabled = false;
    }
  } catch(e) { alert('Błąd: ' + e.message); btn.textContent = orig; btn.disabled = false; }
}

// --- Settings ---
async function loadSettings() {
  var r = await fetch('/api/settings');
  var d = await r.json();
  document.getElementById('set-server').value = d.server_url || '';
  document.getElementById('set-output').value = d.output_dir || '';
}

async function saveSettings() {
  var body = {
    server_url: document.getElementById('set-server').value.trim(),
    output_dir: document.getElementById('set-output').value.trim()
  };
  var r = await fetch('/api/settings', {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
  var d = await r.json();
  var fl = document.getElementById('settings-flash');
  fl.textContent = d.ok ? 'Zapisano' : 'Błąd';
  fl.className = 'coa-flash ' + (d.ok ? 'ok' : 'err');
  setTimeout(function() { fl.className = 'coa-flash'; }, 3000);
}

// --- Init ---
loadBatches();
</script>
</body>
</html>
